version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: backend-db-1
    environment:
      # Read from .env (gitignored). Never commit real passwords.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set it in backend/.env}
      POSTGRES_DB: ${POSTGRES_DB:-trenzy}
    ports:
      - "5433:5433"
    volumes:
      - trenzy_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: backend-backend-1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Compose substitutes from .env loaded above.
      POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-trenzy}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:?FIREBASE_API_KEY is required — set it in backend/.env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      SOCKET_ALLOWED_ORIGINS: ${SOCKET_ALLOWED_ORIGINS:-*}
      # Firebase Admin credentials — load as raw JSON.
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_SERVICE_ACCOUNT_FILE: ${FIREBASE_SERVICE_ACCOUNT_FILE:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  trenzy_db_data:
